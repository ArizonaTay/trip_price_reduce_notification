name: Monitor Trip.com Hotel Prices

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies & Playwright browser
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Commit and push updated prices
        run: |
          git config user.name "Trip Monitor"
          git config user.email "monitor@trip.com"
          git add prices.json
          git diff --quiet HEAD || (git commit -m "Update hotel prices" && git push)
